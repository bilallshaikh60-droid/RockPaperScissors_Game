<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock_Papers_Scissor's_Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="heading"><i>ROCK-PAPER-SCISSOR's</i><sup><code> Game</code></sup> </h1>
   
   <div class="choices">
    <div class="choice" id="rock">
        <img src="rock.jpg.png">
    </div>
    <div class="choice" id="paper">
        <img src="paper.jpg.png">
    </div>
    <div class="choice" id="scissors">
        <img src="scissor.jpg.png">
    </div>
     </div>
  
     <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>U</p>
        </div>
        <div class="score">
            <p id="computer-score">0</p>
            <p><code>Computer</code></p>
        </div>
     </div>
   
     <div class="msg-container">
        <p id="msg">Play Your Move</p>
     </div>
   
    <script src="app.js"></script>
</body>
</html>
